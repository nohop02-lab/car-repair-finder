<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>附近汽修店</title>
    <style>
        html, body, #container {
            width: 100%; height: 100%; margin: 0; padding: 0;
        }
        .control-bar {
            position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: white; border-radius: 30px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3); padding: 10px 12px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
            font-size: 14px; max-width: 95vw;
        }
        .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
        .btn-group button {
            padding: 6px 14px; border: 1px solid #ccc; background: white;
            border-radius: 20px; font-size: 14px; cursor: pointer; white-space: nowrap;
        }
        .btn-group button.active {
            background: #d32f2f; color: white; border-color: #d32f2f;
        }
        .search-row { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 200px; flex-wrap: wrap; }
        .keyword-input { display: flex; align-items: center; gap: 4px; flex: 2; min-width: 150px; }
        .keyword-input input {
            border: 1px solid #ccc; border-radius: 20px; padding: 6px 12px;
            font-size: 14px; width: 100%; box-sizing: border-box;
        }
        .address-input { display: flex; align-items: center; gap: 4px; flex: 1; min-width: 130px; }
        .address-input input {
            border: 1px solid #ccc; border-radius: 20px; padding: 6px 12px;
            font-size: 14px; width: 100%; box-sizing: border-box;
        }
        .address-input button, .keyword-input button {
            background: #d32f2f; color: white; border: none; border-radius: 20px;
            padding: 6px 14px; font-size: 14px; cursor: pointer; white-space: nowrap;
        }
        .status-tag {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 1000; background: rgba(0,0,0,0.7); color: white; padding: 6px 16px;
            border-radius: 20px; font-size: 13px; white-space: nowrap; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div class="control-bar" id="controlBar">
        <div class="btn-group">
            <button id="btn-5km" onclick="changeDistance(5000)" class="active">5 km</button>
            <button id="btn-10km" onclick="changeDistance(10000)">10 km</button>
            <button id="btn-15km" onclick="changeDistance(15000)">15 km</button>
            <button id="btn-20km" onclick="changeDistance(20000)">20 km</button>
            <button onclick="exportToExcel()" style="background:#4CAF50;color:white;border:none;border-radius:20px;padding:6px 14px;font-size:14px;cursor:pointer;white-space:nowrap;margin-left:10px;">导出</button>
        </div>
        <div class="search-row">
            <div class="keyword-input">
                <input type="text" id="keywordInput" placeholder="自定义关键词" value="汽车维修|修车|汽车保养|汽车美容|汽修|洗车|轮胎|汽车改装|4S店|汽车快修|汽车空调|汽车电路" />
                <button onclick="applyKeywordSearch()">搜</button>
            </div>
            <div class="address-input">
                <input type="text" id="addressInput" placeholder="输入地址" />
                <button onclick="searchByAddress()">跳转</button>
            </div>
        </div>
    </div>

    <div class="status-tag" id="statusTag">正在定位...</div>

    <script>
        window._AMapSecurityConfig = { securityJsCode: '73d4243b1c025101016a78b3b9aa8305' };
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=629ce3fb2c7341fe33f9aa1491a3cf0d&plugin=AMap.PlaceSearch,AMap.Geolocation,AMap.DistrictSearch&jscode=73d4243b1c025101016a78b3b9aa8305"></script>
    <script>
        var map, circle, currentMarker, placeSearch;
        var markers = [];
        var foundPois = [];  // 存储搜索到的所有POI，用于导出
        var currentDistance = 5000;
        var currentLocation = null;
        var defaultKeywords = '汽车维修|修车|汽车保养|汽车美容|汽修|洗车|轮胎|汽车改装|4S店|汽车快修|汽车空调|汽车电路';

        function log(msg) {
            console.log('[AMap]', msg);
        }

        function setStatus(msg) {
            document.getElementById('statusTag').innerText = msg;
            log(msg);
        }

        // ===== 初始化 =====
        function initMap() {
            if (typeof AMap === 'undefined') {
                setStatus('地图加载失败 - 请检查API Key域名白名单：nohop02-lab.github.io');
                return;
            }

            map = new AMap.Map('container', {
                zoom: 13,
                center: [113.4110, 22.9330],  // 广州市番禺区东蓝路群兴工业园
                zooms: [3, 18],
                zoomEnable: true,
                scrollWheel: true,
                doubleClickZoom: true,
                dragEnable: true,
                keyboardEnable: true
            });

            log('地图创建成功');

            // 直接初始化 PlaceSearch，不用 AMap.plugin 包裹
            tryInitSearch(0);
        }

        function tryInitSearch(retryCount) {
            try {
                placeSearch = new AMap.PlaceSearch({
                    type: '010100|010101|010102|170000|060000|080000|160000|010103|990000',
                    pageSize: 100,
                    pageIndex: 1,
                    extensions: 'all'
                });
                log('PlaceSearch 初始化完成');

                // 直接用默认位置开始搜索，不等浏览器定位
                updateLocation([113.4110, 22.9330]);
                setStatus('默认定位: 番禺区东蓝路群兴工业园');
                searchAndDisplay();

                // 后台尝试精确定位（不影响使用）
                tryGeolocation();
            } catch(e) {
                log('PlaceSearch 初始化失败: ' + e.message);
                if (retryCount < 5) {
                    setTimeout(function() { tryInitSearch(retryCount + 1); }, 500);
                } else {
                    setStatus('搜索服务加载失败，请刷新页面');
                }
            }
        }

        // ===== 后台定位（不影响页面使用）=====
        function tryGeolocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(
                function(pos) {
                    log('后台定位成功: ' + pos.coords.longitude + ', ' + pos.coords.latitude);
                    var userLoc = [pos.coords.longitude, pos.coords.latitude];
                    if (userLoc[0] > 112.95 && userLoc[0] < 114.05 && userLoc[1] > 22.55 && userLoc[1] < 23.95) {
                        updateLocation(userLoc);
                        setStatus('已定位到你的位置');
                        searchAndDisplay();
                    }
                },
                function(err) {
                    log('后台定位失败, code=' + err.code);
                },
                { timeout: 5000, enableHighAccuracy: false, maximumAge: 300000 }
            );
        }

        function updateLocation(lnglat) {
            currentLocation = lnglat;
            if (currentMarker) {
                currentMarker.setPosition(lnglat);
            } else {
                currentMarker = new AMap.Marker({
                    position: lnglat,
                    icon: new AMap.Icon({
                        size: new AMap.Size(25, 25),
                        image: 'https://webapi.amap.com/theme/v1.3/markers/n/mark_b.png',
                        imageSize: new AMap.Size(25, 25)
                    })
                });
                map.add(currentMarker);
            }
            map.setCenter(lnglat);
        }

        // ===== 周边搜索（自动翻页，不限数量）=====
        function searchAndDisplay() {
            if (!currentLocation) {
                setStatus('请先输入城市名定位');
                return;
            }

            setStatus('正在搜索...');
            clearMarkers();
            foundPois = [];  // 清空旧数据

            var keywords = document.getElementById('keywordInput').value.trim() || defaultKeywords;
            log('搜索: 关键词=' + keywords + ' 位置=' + currentLocation + ' 范围=' + currentDistance);

            drawCircle(currentLocation, currentDistance);

            var allPois = [];
            var PAGE_SIZE = 50;
            var MAX_PAGES = 20;

            var search = new AMap.PlaceSearch({
                type: '010100|010101|010102|170000|060000|080000|160000|010103|990000',
                pageSize: PAGE_SIZE,
                pageIndex: 1,
                extensions: 'all'
            });

            loadPage(1);

            function loadPage(idx) {
                if (idx > MAX_PAGES) { finish(allPois.length); return; }

                search.setPageIndex(idx);
                search.searchNearBy(keywords, currentLocation, currentDistance, function(status, result) {
                    log('第' + idx + '页 status=' + status + ' count=' + (result && result.poiList ? result.poiList.count : '?'));

                    if (status === 'complete' && result.poiList && result.poiList.pois) {
                        var pois = result.poiList.pois;
                        var total = result.poiList.count || 0;

                        for (var i = 0; i < pois.length; i++) {
                            allPois.push(pois[i]);
                            foundPois.push(pois[i]);
                            addMarker(pois[i]);
                        }

                        setStatus('搜索中... ' + allPois.length + ' 家店 (' + (currentDistance/1000) + 'km 内)');

                        if ((total > 0 && idx * PAGE_SIZE < total) || pois.length === PAGE_SIZE) {
                            setTimeout(function() { loadPage(idx + 1); }, 200);
                        } else {
                            finish(allPois.length);
                        }
                    } else if (status === 'no_data') {
                        finish(allPois.length);
                    } else {
                        if (allPois.length > 0) {
                            finish(allPois.length);
                        } else {
                            var errInfo = (result && result.info) ? result.info : '';
                            setStatus('搜索失败: ' + (errInfo || '未知错误'));
                        }
                    }
                });
            }

            function addMarker(poi) {
                var div = document.createElement('div');
                div.style.cssText = 'width:18px;height:18px;border-radius:50%;background:#d32f2f;border:2px solid white;box-shadow:0 0 8px rgba(0,0,0,0.5);';
                var m = new AMap.Marker({
                    position: [poi.location.lng, poi.location.lat],
                    content: div,
                    offset: new AMap.Pixel(-11, -11),
                    title: poi.name
                });
                m.on('click', function() {
                    new AMap.InfoWindow({
                        content: '<div style="padding:6px;max-width:220px;"><b>' + poi.name + '</b><br/><small>' + (poi.address || '暂无地址') + '</small><br/><small>' + (poi.tel || '暂无电话') + '</small></div>',
                        offset: new AMap.Pixel(0, -25)
                    }).open(map, m.getPosition());
                });
                m.setMap(map);
                markers.push(m);
            }

            function finish(count) {
                if (count > 0) {
                    setStatus('共找到 ' + count + ' 家店 (' + (currentDistance/1000) + 'km 内)');
                    map.setFitView();
                } else {
                    setStatus('未找到汽修店，请扩大范围或更换关键词');
                }
            }
        }

        function applyKeywordSearch() {
            if (currentLocation) {
                searchAndDisplay();
            } else {
                alert('请先定位或在上方输入地址后点击跳转');
            }
        }

        // ===== 地址搜索（DistrictSearch + PlaceSearch 并行）=====
        function searchByAddress() {
            var address = document.getElementById('addressInput').value.trim();
            if (!address) {
                alert('请输入地址或城市名');
                return;
            }

            setStatus('正在定位地址...');
            log('定位地址: ' + address);

            var done = false;
            var timer = setTimeout(function() {
                if (!done) { done = true; setStatus('定位超时，请重试'); }
            }, 12000);

            function onFound(name, lng, lat) {
                if (done) return;
                done = true;
                clearTimeout(timer);
                updateLocation([lng, lat]);
                setStatus('已定位: ' + name);
                searchAndDisplay();
            }

            function onFail(msg) {
                if (done) return;
                done = true;
                clearTimeout(timer);
                setStatus(msg || '未找到该地址');
            }

            // 方式1: PlaceSearch 搜具体地点（村/工业园/街道）
            var ps = new AMap.PlaceSearch({ pageSize: 1, extensions: 'base' });
            ps.search(address, function(status, result) {
                if (done) return;
                log('PlaceSearch定位: status=' + status);
                if (status === 'complete' && result.poiList && result.poiList.pois.length > 0) {
                    var poi = result.poiList.pois[0];
                    onFound(poi.name, poi.location.lng, poi.location.lat);
                }
            });

            // 方式2: DistrictSearch 搜行政区划（并行）
            var cityMatch = address.match(/[一-龥]{2,10}(?:市|县|区)/);
            var cityName = cityMatch ? cityMatch[0] : address;
            var levels = ['biz_area', 'district', 'city', 'province'];
            tryLevel(0, address);

            function tryLevel(idx, keyword) {
                if (done) return;
                if (idx >= levels.length) {
                    if (keyword !== cityName && cityName !== address) {
                        tryLevel(0, cityName);
                        return;
                    }
                    return;
                }
                var level = levels[idx];
                log('DistrictSearch level=' + level + ' keyword=' + keyword);
                var ds = new AMap.DistrictSearch({ level: level, extensions: 'base', subdistrict: 0 });
                ds.search(keyword, function(status, result) {
                    if (done) return;
                    if (status === 'complete' && result.districtList && result.districtList.length > 0) {
                        var d = result.districtList[0];
                        if (d.center && d.center.lng && d.center.lat) {
                            onFound(d.name || keyword, d.center.lng, d.center.lat);
                            return;
                        }
                    }
                    tryLevel(idx + 1, keyword);
                });
            }

            // 兜底超时处理
            setTimeout(function() {
                if (!done) onFail('未找到该地址，请尝试输入城市名如"广州市"');
            }, 10000);
        }

        // ===== 工具函数 =====
        function drawCircle(center, radius) {
            if (circle) circle.setMap(null);
            circle = new AMap.Circle({
                center: center, radius: radius,
                strokeColor: "#d32f2f", strokeWeight: 2, strokeOpacity: 0.5,
                fillColor: "#d32f2f", fillOpacity: 0.1
            });
            circle.setMap(map);
        }

        function clearMarkers() {
            for (var i = 0; i < markers.length; i++) {
                markers[i].setMap(null);
            }
            markers = [];
        }

        function changeDistance(distance) {
            currentDistance = distance;
            var btns = document.querySelectorAll('.btn-group button');
            for (var i = 0; i < btns.length; i++) { btns[i].classList.remove('active'); }
            if (distance === 5000) document.getElementById('btn-5km').classList.add('active');
            if (distance === 10000) document.getElementById('btn-10km').classList.add('active');
            if (distance === 15000) document.getElementById('btn-15km').classList.add('active');
            if (distance === 20000) document.getElementById('btn-20km').classList.add('active');
            if (currentLocation) searchAndDisplay();
        }

        // ===== 导出Excel =====
        function exportToExcel() {
            if (foundPois.length === 0) {
                alert('暂无搜索结果可导出');
                return;
            }

            // 生成CSV（Excel直接打开）
            var csv = '﻿序号,店名,地址,电话,经度,纬度\n';
            for (var i = 0; i < foundPois.length; i++) {
                var p = foundPois[i];
                var name = (p.name || '').replace(/"/g, '""');
                var addr = (p.address || '').replace(/"/g, '""');
                var tel = (p.tel || '').replace(/"/g, '""');
                var lng = p.location ? p.location.lng : '';
                var lat = p.location ? p.location.lat : '';
                csv += (i + 1) + ',"' + name + '","' + addr + '","' + tel + '",' + lng + ',' + lat + '\n';
            }

            var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            var url = URL.createObjectURL(blob);
            var link = document.createElement('a');
            link.href = url;
            link.download = '附近汽修店_' + (currentDistance/1000) + 'km_' + new Date().toISOString().slice(0,10) + '.csv';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            setStatus('已导出 ' + foundPois.length + ' 条记录');
        }

        // 启动
        initMap();
    </script>
</body>
</html>
